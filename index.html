<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPEAKREAL - Tèo Miền Tây</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase Legacy SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <!-- File CSS riêng -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-card">
        <h1 class="text-3xl mb-2 text-orange-300">SPEAKREAL</h1>
        <p class="text-xs text-gray-500 mb-6 tracking-widest">PHIÊN BẢN 3 FILE - V0.1.7</p>
        
        <textarea id="user-input" class="input-box" placeholder="Nhập gì đó đi mày...">chán quá đi uống vài chai mày</textarea>
        
        <button id="btn-action" class="btn-gong">Đang Gồng...</button>

        <div id="response-container" class="hidden">
            <p class="text-orange-400 text-sm font-bold mb-1">Tèo (AI) đang nói:</p>
            <div id="response-text" class="text-gray-200 italic"></div>
        </div>
    </div>

    <footer class="mt-8 text-gray-500 text-[10px] tracking-[0.2em] uppercase">
        © 2026 SPEAKREAL · BY NHANTRG.QUACH
    </footer>

    <!-- File JavaScript riêng -->
    <script src="script.js"></script>
</body>
</html>
