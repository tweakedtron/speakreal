<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa Lỗi SPEAKREAL - Tèo Miền Tây</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Itim&display=swap');
        body {
            font-family: 'Itim', cursive;
            background-color: #1a1a1a;
            color: #fff;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
        .btn-gong {
            background: #8b4513;
            transition: all 0.3s ease;
        }
        .btn-gong:hover {
            background: #a0522d;
            transform: scale(1.02);
        }
        .status-dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-card p-8 shadow-2xl">
        <h1 class="text-3xl text-center mb-6 text-orange-400">Sửa Lỗi API Cho Mày!</h1>
        
        <div class="mb-4">
            <p class="text-gray-300 text-sm mb-2">Trạng thái kết nối:</p>
            <div id="status-box" class="flex items-center gap-2 bg-black/30 p-3 rounded-lg">
                <span id="api-indicator" class="status-dot bg-gray-500"></span>
                <span id="api-text" class="text-sm">Chưa có chìa khóa...</span>
            </div>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs text-gray-400 mb-1">Dán Gemini API Key vô đây (Tao sẽ tự lưu):</label>
                <div class="flex gap-2">
                    <input type="password" id="api-key-input" 
                        class="flex-1 bg-gray-800 border border-gray-700 rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500"
                        placeholder="AIzaSy...">
                    <button id="save-key-btn" class="bg-blue-600 px-3 rounded-lg text-xs hover:bg-blue-500">Lưu</button>
                </div>
                <p class="text-[10px] text-gray-500 mt-1">* Đừng đẩy Key trực tiếp lên GitHub, coi chừng bị nó khóa á!</p>
            </div>

            <div class="bg-gray-800/50 p-4 rounded-xl italic text-gray-300 text-center border-l-4 border-orange-500">
                "Chán quá đi uống vài chai mày"
            </div>

            <button id="action-btn" class="w-full btn-gong py-4 rounded-xl text-xl font-bold uppercase tracking-widest">
                Đang Gồng...
            </button>
        </div>

        <div id="response-area" class="mt-6 p-4 bg-orange-900/20 border border-orange-500/30 rounded-xl hidden">
            <p class="text-orange-300 font-bold mb-1 text-sm">Tèo phản hồi:</p>
            <div id="bot-text" class="text-white text-sm leading-relaxed"></div>
        </div>

        <footer class="mt-8 text-center text-[10px] text-gray-600 uppercase tracking-tighter">
            © 2026 SPEAKREAL — V0.1.4 · CRAFTED BY TEO MIEN TAY
        </footer>
    </div>

    <script>
        const apiKeyInput = document.getElementById('api-key-input');
        const saveKeyBtn = document.getElementById('save-key-btn');
        const actionBtn = document.getElementById('action-btn');
        const botText = document.getElementById('bot-text');
        const responseArea = document.getElementById('response-area');
        const apiIndicator = document.getElementById('api-indicator');
        const apiText = document.getElementById('api-text');

        // 1. Kiểm tra xem trong máy có lưu Key chưa
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) {
            apiKeyInput.value = savedKey;
            apiIndicator.className = "status-dot bg-yellow-500";
            apiText.innerText = "Đã nhận Key từ bộ nhớ!";
        }

        // 2. Hàm lưu Key vào trình duyệt
        saveKeyBtn.addEventListener('click', () => {
            const val = apiKeyInput.value.trim();
            if (val) {
                localStorage.setItem('gemini_api_key', val);
                apiIndicator.className = "status-dot bg-green-500";
                apiText.innerText = "Đã lưu Key thành công!";
                setTimeout(() => { apiText.innerText = "Sẵn sàng gồng!"; }, 2000);
            }
        });

        // 3. Hàm gọi API với cơ chế Exponential Backoff
        async function callGemini(prompt, key, retries = 5, delay = 1000) {
            // Sử dụng model ổn định nhất
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "Mày tên là Tèo, một thằng bạn thân miền Tây chính hiệu. Nói chuyện dân dã, chân chất, xưng tao mày. Hay rủ đi nhậu, đi câu cá." }] }
            };

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text;
                    }

                    if (response.status === 429 || response.status >= 500) {
                        await new Promise(res => setTimeout(res, delay));
                        delay *= 2;
                        continue;
                    }
                    
                    const errData = await response.json();
                    throw new Error(errData.error?.message || 'Lỗi hệ thống rồi!');
                } catch (err) {
                    if (i === retries - 1) throw err;
                }
            }
        }

        actionBtn.addEventListener('click', async () => {
            const key = apiKeyInput.value.trim();
            const prompt = "Chán quá đi uống vài chai mày";

            if (!key) {
                apiIndicator.className = "status-dot bg-red-500";
                apiText.innerText = "Thiếu Key rồi cha nội!";
                return;
            }

            actionBtn.innerText = "Đang gồng dữ lắm...";
            actionBtn.disabled = true;
            responseArea.classList.add('hidden');

            try {
                const result = await callGemini(prompt, key);
                botText.innerText = result;
                responseArea.classList.remove('hidden');
                apiIndicator.className = "status-dot bg-green-500";
                apiText.innerText = "Kết nối ngon lành!";
            } catch (error) {
                apiIndicator.className = "status-dot bg-red-500";
                apiText.innerText = "Key bị lỗi hoặc hết hạn!";
                console.error(error);
                botText.innerText = "Lỗi rồi: " + error.message;
                responseArea.classList.remove('hidden');
            } finally {
                actionBtn.innerText = "Đang Gồng...";
                actionBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
