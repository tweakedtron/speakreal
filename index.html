<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>SpeakReal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-orange-50 flex flex-col items-center justify-center min-h-screen p-6">

  <h1 class="text-4xl font-black mb-6">🔥 SpeakReal</h1>

  <textarea id="input"
    class="w-full max-w-xl p-4 rounded-xl border text-lg"
    placeholder="Nhập tiếng Việt..."></textarea>

  <button id="btn"
    class="mt-4 px-6 py-3 bg-orange-500 text-white rounded-xl font-bold">
    Xuất Chiêu
  </button>

  <pre id="output"
    class="mt-6 w-full max-w-xl bg-black text-green-400 p-4 rounded-xl whitespace-pre-wrap"></pre>

<script src="script.js"></script>
</body>
</html>
