<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPEAKREAL - Tèo Miền Tây</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Itim&display=swap');
        body {
            font-family: 'Itim', cursive;
            background: linear-gradient(180deg, #8b4513 0%, #1a1a1a 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .main-card {
            background: #2a2a2a;
            border-radius: 40px;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        .input-box {
            background: #333;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 100px;
            font-size: 1.2rem;
            line-height: 1.4;
            color: #eee;
            border: 2px solid transparent;
            width: 100%;
            resize: none;
            outline: none;
            transition: border 0.3s;
        }
        .input-box:focus {
            border-color: #d2a679;
        }
        .btn-gong {
            background: #4a2c1a;
            color: #d2a679;
            width: 100%;
            padding: 15px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 0 #2a180d;
        }
        .btn-gong:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .btn-gong:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #response-container {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            text-align: left;
            border-left: 4px solid #d2a679;
        }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #d2a679;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1 class="text-2xl mb-6 text-orange-300">SPEAKREAL V0.1.6</h1>
        
        <textarea id="user-input" class="input-box" placeholder="Nhập gì đó đi mày...">chán quá đi uống vài chai mày</textarea>
        
        <button id="btn-action" class="btn-gong">Đang Gồng...</button>

        <div id="response-container" class="hidden">
            <p class="text-orange-400 text-sm font-bold mb-1">Tèo nè mày:</p>
            <div id="response-text" class="text-gray-200"></div>
        </div>
    </div>

    <footer class="mt-8 text-gray-500 text-xs tracking-widest uppercase">
        © 2026 SPEAKREAL · BY NHANTRG.QUACH
    </footer>

    <script>
        // --- CẤU HÌNH CỦA MÀY NÈ ---
        const firebaseConfig = {
            apiKey: "AIzaSyA5FbN-2Gx5ZnvIx0r4Dc6W741Y_gVxk4M",
            authDomain: "speakreal-a5f44.firebaseapp.com",
            projectId: "speakreal-a5f44",
            storageBucket: "speakreal-a5f44.firebasestorage.app",
            messagingSenderId: "318441420730",
            appId: "1:318441420730:web:c40ae61784f66778f44f83",
            measurementId: "G-PWGYCTQDM7"
        };
        
        // CÁI NÀY MỚI LÀ KEY ĐỂ GỌI AI NÈ CHA NỘI
        const GEMINI_API_KEY = "AIzaSyDO6ZVI4nHZBTZRUoAp0U6JDlVpnEFsqSg"; 

        // Khởi tạo Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const btnAction = document.getElementById('btn-action');
        const userInput = document.getElementById('user-input');
        const responseContainer = document.getElementById('response-container');
        const responseText = document.getElementById('response-text');

        async function callGemini(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
            
            const systemPrompt = "Mày tên là Tèo, bạn thân của người dùng. Nói chuyện rặt miền Tây (mày-tao, chân chất, hay rủ đi nhậu). Trả lời ngắn gọn, vui vẻ, thân thiết.";

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ text: `${systemPrompt}\n\nNgười dùng nói: ${prompt}` }] 
                    }]
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || "Lỗi API rồi!");
            }

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        btnAction.addEventListener('click', async () => {
            const text = userInput.value.trim();
            if (!text) return;

            btnAction.disabled = true;
            btnAction.innerHTML = '<span class="loading-spinner"></span> Đang gồng...';
            responseContainer.classList.add('hidden');

            try {
                const reply = await callGemini(text);
                responseText.innerText = reply;
                responseContainer.classList.remove('hidden');

                // Lưu vô Firestore chơi cho vui (nếu thích)
                db.collection("chat_history").add({
                    user: text,
                    teo: reply,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }).catch(e => console.log("Lưu lỗi kệ nó:", e));

            } catch (err) {
                responseText.innerText = "Trời đất ơi lỗi rồi: " + err.message;
                responseContainer.classList.remove('hidden');
            } finally {
                btnAction.disabled = false;
                btnAction.innerText = "Đang Gồng...";
            }
        });
    </script>
</body>
</html>
